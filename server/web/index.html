<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentLink</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
  <link id="hljs-theme" rel="stylesheet" href="/vendor/github.min.css">
  <script>
    // Apply saved theme immediately to prevent flash
    (function() {
      var t = localStorage.getItem('agentlink-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
      var link = document.getElementById('hljs-theme');
      if (link) link.href = t === 'light'
        ? '/vendor/github.min.css'
        : '/vendor/github-dark.min.css';
    })();
  </script>
  <script>
    // iPad: track visualViewport to handle keyboard accessory bar
    (function() {
      if (!window.visualViewport) return;
      function onViewportChange() {
        var vv = window.visualViewport;
        var app = document.getElementById('app');
        if (!app) return;
        // When keyboard accessory bar appears, visual viewport shrinks
        // and may scroll. Adjust #app to stay within visible area.
        app.style.top = vv.offsetTop + 'px';
        app.style.height = vv.height + 'px';
        app.style.bottom = 'auto';
      }
      window.visualViewport.addEventListener('resize', onViewportChange);
      window.visualViewport.addEventListener('scroll', onViewportChange);
    })();
  </script>
  <script src="/vendor/vue.global.prod.js"></script>
  <script src="/vendor/marked.min.js"></script>
  <script src="/vendor/highlight.min.js"></script>
  <script src="/vendor/nacl-fast.min.js"></script>
  <script src="/vendor/nacl-util.min.js"></script>
  <script src="/vendor/pako.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
