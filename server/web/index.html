<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#1e1e1e" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#fefcf8" media="(prefers-color-scheme: light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AgenticWorker</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link id="hljs-theme" rel="stylesheet" href="./vendor/github.min.css">
  <script>
    // Apply saved theme immediately to prevent flash
    (function() {
      var t = localStorage.getItem('agentlink-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
      var link = document.getElementById('hljs-theme');
      if (link) link.href = t === 'light'
        ? './vendor/github.min.css'
        : './vendor/github-dark.min.css';
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script>
    // Show loading spinner for Entra-protected routes while auth initializes
    if (window.location.pathname.startsWith('/ms/') || window.location.pathname === '/auth/callback') {
      document.getElementById('app').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:100vh">' +
        '<div style="width:32px;height:32px;border:3px solid rgba(128,128,128,0.2);border-top-color:rgba(128,128,128,0.7);border-radius:50%;animation:spin .8s linear infinite"></div>' +
        '</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
    }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
